<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <div class="logo">Kanban Board</div>
        <p class="app-subtitle">Arquitetura modular para evoluir o produto sem acoplar UI, estado e regras de negocio.</p>
      </div>

      <div class="header-controls">
        <span class="sort-label">Ordenar</span>

        <button class="sort-btn active" data-action="set-sort" data-sort="none" type="button">
          Sem ordenacao
        </button>
        <button class="sort-btn" data-action="set-sort" data-sort="priority" type="button">
          Prioridade
        </button>
        <button class="sort-btn" data-action="set-sort" data-sort="date" type="button">
          Data
        </button>

        <div class="header-divider"></div>

        <button class="export-btn" data-action="export-cards" type="button">Exportar</button>
        <button class="import-btn" data-action="trigger-import" type="button">Importar</button>
        <input id="import-input" type="file" accept=".json" hidden>

        <button class="add-btn" data-action="open-create-modal" type="button">Nova Tarefa</button>
      </div>
    </header>

    <main class="board" id="board-root" aria-live="polite"></main>
  </div>

  <div class="modal-overlay" id="task-modal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <p class="modal-eyebrow">Gestao de tarefas</p>
          <h2 class="modal-title" id="modal-title">Nova Tarefa</h2>
        </div>
        <button class="icon-btn" data-action="close-modal" type="button" aria-label="Fechar modal">x</button>
      </div>

      <form id="task-form" class="task-form">
        <input id="task-id" name="id" type="hidden">

        <label class="form-group">
          <span class="form-label">Titulo *</span>
          <input class="form-input" id="task-title" name="title" placeholder="Nome da tarefa..." required>
        </label>

        <label class="form-group">
          <span class="form-label">Descricao</span>
          <textarea class="form-textarea" id="task-desc" name="desc" placeholder="Detalhes opcionais..."></textarea>
        </label>

        <div class="form-row">
          <label class="form-group">
            <span class="form-label">Prioridade</span>
            <select class="form-select" id="task-priority" name="priority">
              <option value="high">Alta</option>
              <option value="med">Media</option>
              <option value="low">Baixa</option>
            </select>
          </label>

          <label class="form-group">
            <span class="form-label">Data de entrega</span>
            <input class="form-input" id="task-date" name="date" type="date">
          </label>
        </div>

        <label class="form-group">
          <span class="form-label">Coluna</span>
          <select class="form-select" id="task-col" name="col"></select>
        </label>

        <div class="modal-actions">
          <button class="btn-secondary" data-action="close-modal" type="button">Cancelar</button>
          <button class="btn-primary" type="submit">Salvar Tarefa</button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast-stack" id="toast-root" aria-live="assertive" aria-atomic="true"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
